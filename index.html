<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><div class="logo">DriveCare</div><a href="login.html" style="color:var(--primary); font-weight:700; text-decoration:none;">Login</a></nav>
    <header class="hero-banner"><h1>Car Care</h1><p>Premium Services</p></header>
    <div class="content-container">
        <div class="services-grid">
            <div class="ui-card"><div class="icon-circle"><img src="wash.png"></div><h3>Wash</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="interior.png"></div><h3>Interior</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="detail.png"></div><h3>Detailing</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="oil.png"></div><h3>Oil</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="battery.png"></div><h3>Battery</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="paint.png"></div><h3>Paint</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="repai.png"></div><h3>Repair</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="spare.png"></div><h3>Spares</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
            <div class="ui-card"><div class="icon-circle"><img src="tow.png"></div><h3>Towing</h3><button class="btn-drive" onclick="openBooking()">Book</button></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
