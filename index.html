<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DriveCare — Doorstep Vehicle Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2 style="font-family:'Plus Jakarta Sans';">DriveCare</h2>
        <div class="nav">
            <button class="btn btn-outline" onclick="location.href='login.html'">Login</button>
            <button class="btn btn-primary" onclick="location.href='signup.html'" style="margin-left:10px">Sign Up</button>
        </div>
    </header>

    <section style="padding: 100px 8%; display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 40px;">
        <div>
            <h1 style="font-family:'Plus Jakarta Sans'; font-size: 3.5rem; line-height: 1.1;">Premium Car Care <span style="color:var(--primary)">At Your Door</span></h1>
            <p style="color:var(--text-muted); margin: 20px 0 30px;">Professional services from wash to repair, tracked in real-time.</p>
            <button class="btn btn-primary" onclick="openBooking()">📅 Book a Service</button>
        </div>
        <div style="background: var(--primary-soft); height: 400px; border-radius: 30px;"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
