<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveCare | Car Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DriveCare</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html" class="login-btn">Login / Sign Up</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Professional Car Care</h1>
        <p>Expert services for your vehicle.</p>
    </header>

    <section class="services-section">
        <h2 class="section-title">Our Services</h2>
        <div class="services-grid">
            
            <div class="service-card">
                <img src="wash.png" alt="Wash" class="service-icon">
                <h3>Premium Wash</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="interior.png" alt="Interior" class="service-icon">
                <h3>Interior Cleaning</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="detail.png" alt="Detail" class="service-icon">
                <h3>Full Detailing</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="oil.png" alt="Oil" class="service-icon">
                <h3>Oil Change</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="battery.png" alt="Battery" class="service-icon">
                <h3>Battery Service</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="paint.png" alt="Paint" class="service-icon">
                <h3>Paint Protection</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="repai.png" alt="Repair" class="service-icon">
                <h3>General Repair</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="spare.png" alt="Spare" class="service-icon">
                <h3>Genuine Spares</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

            <div class="service-card">
                <img src="tow.png" alt="Tow" class="service-icon">
                <h3>24/7 Towing</h3>
                <button class="book-btn" onclick="openBooking()">Book Now</button>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
