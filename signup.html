<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card" style="max-width: 500px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-family: 'Plus Jakarta Sans'; font-weight: 800; color: var(--dark);">Create Account</h1>
            <p style="color: var(--text-muted);">Experience premium vehicle care</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label style="font-weight: 600; font-size: 0.8rem;">First Name *</label>
                <input type="text" class="form-control" id="fname" placeholder="John">
            </div>
            <div class="form-group">
                <label style="font-weight: 600; font-size: 0.8rem;">Last Name</label>
                <input type="text" class="form-control" id="lname" placeholder="Doe">
            </div>
        </div>

        <div class="form-group">
            <label style="font-weight: 600; font-size: 0.8rem;">Phone Number *</label>
            <input type="tel" class="form-control" id="phone" placeholder="+91 XXXXX XXXXX">
            <div id="phoneErr" style="display:none; color: var(--danger); font-size: 0.75rem; margin-top: 4px;"></div>
        </div>

        <div class="form-group">
            <label style="font-weight: 600; font-size: 0.8rem;">Password *</label>
            <input type="password" class="form-control" id="pass" placeholder="Min. 6 characters">
            <div id="passErr" style="display:none; color: var(--danger); font-size: 0.75rem; margin-top: 4px;"></div>
        </div>

        <div class="form-group">
            <label style="font-weight: 600; font-size: 0.8rem;">Confirm Password</label>
            <input type="password" class="form-control" id="cpass" placeholder="Repeat password">
        </div>

        <button class="btn btn-primary" id="signupBtn" onclick="signup()" style="width: 100%; padding: 16px; margin-top: 10px;">
            Create Free Account
        </button>

        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
            Already registered? <a href="login.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Sign In</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
