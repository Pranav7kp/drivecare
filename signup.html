<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><div class="logo">DriveCare</div></nav>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="color:var(--primary);">Join DriveCare</h2>
            <input type="text" id="fname" class="input-field" placeholder="Full Name">
            <input type="number" id="phone" class="input-field" placeholder="Phone Number">
            <input type="password" id="pass" class="input-field" placeholder="Create Password">
            <button class="btn-book" onclick="signup()">Create Account</button>
            <p style="margin-top:20px;">Already a member? <a href="login.html" style="color:var(--primary); font-weight:600;">Login</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
