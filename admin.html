<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel — DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #f0f2f5; padding: 40px;">

    <div style="max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Admin Dashboard</h1>
            <button onclick="DC.logout()" style="color:red; background:none; border:none; cursor:pointer;">Logout</button>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
            <div style="background:#eef2ff; padding:20px; border-radius:10px;">
                <h3>Total Users</h3>
                <h2 id="totalUsers">0</h2>
            </div>
            <div style="background:#fff7ed; padding:20px; border-radius:10px;">
                <h3>Total Bookings</h3>
                <h2 id="totalBookings">0</h2>
            </div>
        </div>

        <h3 style="margin-top:40px;">Customer Bookings</h3>
        <table style="width:100%; border-collapse:collapse; margin-top:10px;">
            <thead style="background:#f8fafc;">
                <tr>
                    <th style="padding:12px; text-align:left; border-bottom:2px solid #eee;">Customer</th>
                    <th style="padding:12px; text-align:left; border-bottom:2px solid #eee;">Service</th>
                    <th style="padding:12px; text-align:left; border-bottom:2px solid #eee;">Date</th>
                    <th style="padding:12px; text-align:left; border-bottom:2px solid #eee;">Status</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = DC.getSession();
            if(!user || user.role !== 'admin') window.location.href = 'login.html';

            const users = DC.getUsers();
            const bookings = DC.getBookings();

            document.getElementById('totalUsers').innerText = users.length;
            document.getElementById('totalBookings').innerText = bookings.length;

            document.getElementById('adminTableBody').innerHTML = bookings.map(b => `
                <tr>
                    <td style="padding:12px; border-bottom:1px solid #eee;">${b.userName}</td>
                    <td style="padding:12px; border-bottom:1px solid #eee;">${b.service}</td>
                    <td style="padding:12px; border-bottom:1px solid #eee;">${b.date}</td>
                    <td style="padding:12px; border-bottom:1px solid #eee; color:blue;">${b.status}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" style="text-align:center; padding:20px;">No bookings yet.</td></tr>';
        });
    </script>
</body>
</html>
