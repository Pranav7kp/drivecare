<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel — DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DriveCare Admin</div>
        <button onclick="logout()" style="background:none; border:1px solid red; color:red; padding:5px 15px; border-radius:5px; cursor:pointer;">Logout</button>
    </nav>

    <div class="services-container">
        <h2>Customer Service Requests</h2>
        <div class="service-card" style="padding:0;">
            <table style="width:100%; border-collapse: collapse;">
                <thead style="background:var(--primary); color:white;">
                    <tr>
                        <th style="padding:15px;">Customer</th>
                        <th style="padding:15px;">Service</th>
                        <th style="padding:15px;">Status</th>
                    </tr>
                </thead>
                <tbody id="adminTable">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
