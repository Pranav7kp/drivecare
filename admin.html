<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | DriveCare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
      </svg>
    </div>
    Drive<span>Care</span> <span style="font-size:13px; color:var(--gold); margin-left:8px; background:rgba(245,166,35,0.2); padding:3px 10px; border-radius:20px;">Admin</span>
  </div>
  <button class="nav-btn-outline" onclick="logout()">Logout</button>
</nav>

<div class="page-wrap">
  <!-- ADMIN STATS -->
  <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px;">
    <div class="card-white" style="padding:20px; background:linear-gradient(135deg,var(--primary),#1a4a8a); color:white; border:none;">
      <div style="font-size:28px; font-weight:800; font-family:'Syne',sans-serif;" id="adminTotal">0</div>
      <div style="font-size:13px; opacity:0.8; margin-top:4px;">Total Requests</div>
    </div>
    <div class="card-white" style="padding:20px; background:linear-gradient(135deg,#10b981,#059669); color:white; border:none;">
      <div style="font-size:28px; font-weight:800; font-family:'Syne',sans-serif;" id="adminActive">0</div>
      <div style="font-size:13px; opacity:0.8; margin-top:4px;">Active Jobs</div>
    </div>
    <div class="card-white" style="padding:20px; background:linear-gradient(135deg,#f59e0b,#d97706); color:white; border:none;">
      <div style="font-size:28px; font-weight:800; font-family:'Syne',sans-serif;" id="adminPending">0</div>
      <div style="font-size:13px; opacity:0.8; margin-top:4px;">Pending</div>
    </div>
    <div class="card-white" style="padding:20px; background:linear-gradient(135deg,#e94560,#c73850); color:white; border:none;">
      <div style="font-size:28px; font-weight:800; font-family:'Syne',sans-serif;" id="adminRevenue">₹0</div>
      <div style="font-size:13px; opacity:0.8; margin-top:4px;">Est. Revenue</div>
    </div>
  </div>

  <div class="section-header" style="margin-bottom:16px;">
    <div class="section-title">All Service Requests</div>
    <select id="adminFilter" class="ui-input" style="width:auto; padding:8px 14px; font-size:13px;" onchange="renderAdminTable()">
      <option value="all">All Status</option>
      <option value="Pending">Pending</option>
      <option value="Confirmed">Confirmed</option>
      <option value="En Route">En Route</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select>
  </div>

  <div class="card-white">
    <div style="overflow-x:auto;">
      <table class="admin-table" id="adminTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Customer</th>
            <th>Service</th>
            <th>Vehicle</th>
            <th>Location</th>
            <th>Date</th>
            <th>Estimate</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="adminTableBody">
        </tbody>
      </table>
    </div>
    <div id="adminEmpty" style="display:none; padding:40px; text-align:center; color:var(--muted);">
      <div style="font-size:36px; margin-bottom:8px;">📋</div>
      <p>No service requests yet</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script> loadAdminPanel(); </script>
</body>
</html>
