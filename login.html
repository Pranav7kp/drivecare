<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><div class="logo">DriveCare</div></nav>
    <div class="auth-wrapper"><div class="auth-box ui-card">
        <h2 style="color:var(--primary);">Login</h2>
        <input type="text" id="loginPhone" class="ui-input" placeholder="Phone Number">
        <input type="password" id="loginPass" class="ui-input" placeholder="Password">
        <button class="btn-drive" onclick="login()">Login</button>
        <p style="margin-top:15px; font-size:14px;">New? <a href="signup.html" style="color:var(--primary); text-decoration:none; font-weight:700;">Sign Up</a></p>
    </div></div>
    <script src="script.js"></script>
</body>
</html>
