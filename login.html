<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | DriveCare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand">Drive<span>Care</span></div>
      <p>Complete Care, Anytime, Anywhere</p>
    </div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to continue booking services</p>

    <div class="field-group">
      <label class="field-label">Phone Number</label>
      <input type="tel" id="loginPhone" class="ui-input" placeholder="10-digit mobile number" maxlength="15">
    </div>
    <div class="field-group">
      <label class="field-label">Password</label>
      <div style="position:relative;">
        <input type="password" id="loginPass" class="ui-input" placeholder="Enter your password" style="padding-right:44px;">
        <button onclick="togglePass('loginPass', this)" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:var(--muted);">👁</button>
      </div>
    </div>

    <div id="loginError" style="color:var(--accent); font-size:13px; margin-bottom:8px; display:none;"></div>

    <button class="btn-primary" onclick="login()">Sign In</button>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
