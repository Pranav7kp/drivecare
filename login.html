<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DriveCare</div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="color:var(--primary);">User Login</h2>
            <input type="text" id="loginPhone" class="input-field" placeholder="Phone Number / Admin ID">
            <input type="password" id="loginPass" class="input-field" placeholder="Password">
            <button class="btn-primary" onclick="login()">Login to Dashboard</button>
            <p style="margin-top:15px;">New User? <a href="signup.html" style="color:var(--primary);">Create Account</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
