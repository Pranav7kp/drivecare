<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h2>DriveCare Login</h2>
        <div class="input-group">
            <input type="text" id="loginPhone" placeholder="Phone Number or Admin ID">
        </div>
        <div class="input-group">
            <input type="password" id="loginPass" placeholder="Password">
        </div>
        <button class="btn-blue" onclick="login()">Login</button>
        <p style="margin-top:15px;">New? <a href="signup.html" style="color:var(--primary);">Create Account</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
