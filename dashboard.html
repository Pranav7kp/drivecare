<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard — DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard-layout">
    <div class="sidebar">
        <div class="logo" style="margin-bottom: 40px;">
            <span>DriveCare</span>
        </div>
        <nav>
            <button class="nav-item active">📊 My Bookings</button>
            <button class="nav-item">📍 Track Service</button>
            <button class="nav-item">🕐 History</button>
            <button class="nav-item">👤 Profile</button>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid var(--border);">
            <button class="nav-item" style="color: #ef4444;">🚪 Logout</button>
        </nav>
    </div>

    <main class="main-content">
        <h2 style="font-family:'Plus Jakarta Sans'; margin-bottom: 20px;">Welcome back!</h2>
        <div style="background: white; padding: 40px; border-radius: var(--radius); border: 1px solid var(--border);">
            <p style="color: var(--text-muted);">Your recent bookings and car health will appear here.</p>
        </div>
    </main>
</div>
</body>
</html>
