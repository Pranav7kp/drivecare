<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard — DriveCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="panel-container">
        <header class="panel-header">
            <h1 style="color:var(--primary);">DriveCare Dashboard</h1>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </header>

        <div class="data-card">
            <h3>Welcome back!</h3>
            <p>Your vehicle's health and service history will appear here.</p>
            <div id="userBookings">No bookings found.</div>
            <button class="btn-blue" onclick="window.location.href='index.html'" style="margin-top:20px; width:auto;">Book a New Service</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
